meta:
  id: status_bar
  name: 状态栏扩展
  version: 1.0.0
  schema_type: extension
  filament_spec: 3.0.0
  author: Clotho 协议团队
  description: 为 UI 提供轻量状态展示数据。

tags:
  - name: status_bar
    body_format: json
    description: 以键值列表形式展示轻量状态摘要。

injection:
  position: system_end
  priority: 120

instruction: |
  当界面需要持续展示轻量状态时输出 <status_bar>。
  items 应保持简洁稳定，避免在单轮中输出过多字段。
  value 应尽量使用短文本或数字，便于 UI 紧凑展示。

examples:
  - name: travel_status
    input: |
      当前处于深夜赶路场景，需要展示情绪和位置。
    output: |
      <status_bar>
      {
        "items": [
          { "id": "mood", "label": "情绪", "value": "紧张" },
          { "id": "location", "label": "位置", "value": "黑雾森林" },
          { "id": "time", "label": "时间", "value": "午夜" }
        ]
      }
      </status_bar>

parser_hints:
  root_tag: status_bar
  body_format: json
  behavior: render_status_bar
  required_fields:
    - items
