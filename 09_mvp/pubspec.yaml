name: clotho_mvp
description: "Clotho MVP Demo - Next-generation AI RPG Client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.4+3
  
  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Network
  dio: ^5.7.0
  
  # Parsing
  xml: ^6.5.0
  yaml: ^3.1.3
  
  # Utilities
  uuid: ^4.5.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  drift_dev: ^2.22.1
  freezed: ^3.2.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/personas/